name: Sync to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Prepare clean sync folder
        run: |
          mkdir hf-sync
          rsync -av ./ hf-sync/ \
            --exclude '.git' \
            --exclude 'artifacts' \
            --exclude '*.mp4' \
            --exclude 'outputs'

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd hf-sync

          git init
          git checkout -b main
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git remote add origin https://oauth2:$HF_TOKEN@huggingface.co/spaces/Amanbedua/directors-cut-backend

          git add .
          git commit -m "Sync from GitHub" || echo "No changes"

          git push --force origin main
