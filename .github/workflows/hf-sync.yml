name: Sync backend to Hugging Face

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/hf-sync.yml"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Prepare backend-only sync folder
        run: |
          mkdir hf-sync
          rsync -av backend/ hf-sync/ \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'artifacts' \
            --exclude '*.mp4' \
            --exclude 'outputs'

      - name: Push backend to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "HF_TOKEN secret is missing"
            exit 1
          fi

          cd hf-sync

          git init
          git checkout -b main
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git remote add origin https://oauth2:$HF_TOKEN@huggingface.co/spaces/Amanbedua/directors-cut-backend

          git add .
          git commit -m "Sync backend from GitHub" || echo "No changes"

          git push --force origin main
